<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: #5c5151;
}

.container{
    width:900px;
    margin:40px auto;
    background:white;
    display:flex;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* Partie gauche */
.left{
    width:35%;
    background:#1e293b;
    color:white;
    padding:30px;
    text-align:center;
}

.left img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:4px solid rgb(255, 255, 255);
    object-fit:cover;
    margin-bottom:15px;
}

.left h2{
    margin:10px 0 5px;
}

.left p{
    font-size:14px;
    opacity:0.9;
}

.section{
    margin-top:30px;
    text-align:left;
}

.section h3{
    border-bottom:2px solid #38bdf8;
    padding-bottom:5px;
    margin-bottom:10px;
}

/* Partie droite */
.right{
    width:65%;
    padding:40px;
}

.right h1{
    margin-top:0;
    color:#1e293b;
}

.right h3{
    color:#0ea5e9;
    margin-bottom:5px;
}

.right p{
    font-size:14px;
    line-height:1.6;
}

.skill{
    margin-bottom:10px;
}

.skill span{
    font-size:14px;
}

.bar{
    background:#ddd;
    height:6px;
    border-radius:5px;
}

.bar div{
    height:6px;
    background:#0ea5e9;
    border-radius:5px;
}
</style>
</head>
<body>
    
</body>
</html>
